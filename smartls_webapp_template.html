<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smartls web report</title>
    <style>/*SMARTLS_CSS*/</style>
</head>
<body>
    <div class="header">
        <div>
            <p class="eyebrow">smartls</p>
            <h1>Filesystem Report</h1>
            <p class="hero-copy">A self-contained treegrid browser for matched files and folders, keeping hierarchy and metadata together in one navigable table.</p>
        </div>
        <div class="header-info">
            <span id="rootPath"></span>
            <span id="generatedAt"></span>
            <span id="sortMode"></span>
        </div>
        <div class="search-bar">
            <input id="searchInput" type="search" placeholder="Search files and folders...">
            <button id="resetFilters" class="search-button" type="button">Clear</button>
        </div>
    </div>

    <section class="summary-grid" id="summaryGrid"></section>

    <section class="treegrid-shell">
        <div class="toolbar">
            <div class="toolbar-controls">
                <button id="expandAll" class="ghost-button" type="button">Expand all</button>
                <button id="collapseAll" class="ghost-button" type="button">Collapse all</button>
                <label>
                    <span>Type</span>
                    <select id="typeFilter">
                        <option value="all">All entries</option>
                        <option value="f">Files</option>
                        <option value="d">Directories</option>
                    </select>
                </label>
                <label>
                    <span>Extension</span>
                    <select id="extFilter">
                        <option value="all">All extensions</option>
                    </select>
                </label>
            </div>
            <div class="toolbar-status">
                <span id="folderCount"></span>
                <span id="activeDirectory"></span>
            </div>
        </div>

        <section class="content-panel">
            <div class="panel-header">
                <div>
                    <h2 id="currentPath">Filesystem Tree</h2>
                    <p id="resultCount"></p>
                </div>
                <div class="breadcrumb" id="breadcrumb"></div>
            </div>
            <div class="treegrid-wrap">
                <table class="treegrid" aria-label="Filesystem tree grid">
                    <thead>
                        <tr>
                            <th><button type="button" data-sort="name_path">Name</button></th>
                            <th><button type="button" data-sort="type">Type</button></th>
                            <th><button type="button" data-sort="size_bytes">Size</button></th>
                            <th><button type="button" data-sort="modified">Modified</button></th>
                            <th><button type="button" data-sort="created">Created</button></th>
                            <th><button type="button" data-sort="depth">Depth</button></th>
                            <th>Metadata</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>
        </section>
    </section>

    <script>
        const SMARTLS_REPORT = /*SMARTLS_JSON*/;
    </script>
    <script>/*SMARTLS_JS*/</script>
</body>
</html>
