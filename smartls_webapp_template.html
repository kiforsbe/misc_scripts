<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smartls web report</title>
    <style>/*SMARTLS_CSS*/</style>
</head>
<body>
    <div class="app-window">
        <div class="window-pathbar">
            <div class="address-shell">
                <span class="address-label">Location</span>
                <div class="address-value" id="addressValue">
                    <div class="breadcrumb address-breadcrumb" id="breadcrumb"></div>
                </div>
            </div>
            <div class="smart-filter-shell">
                <label class="smart-filter-label" for="searchInput">Smart filter</label>
                <div class="smart-filter-row">
                    <input id="searchInput" type="search" placeholder="Try: name:*mkv size:>700MB mtime:<7d type:file or mime:video/*">
                </div>
            </div>
        </div>

        <div class="workspace-shell">
            <section class="tree-pane">
                <section class="treegrid-shell">
                    <div class="treegrid-wrap">
                        <table class="treegrid" aria-label="Filesystem tree grid">
                            <colgroup id="treegridColgroup"></colgroup>
                            <thead>
                                <tr id="treegridHeaderRow"></tr>
                            </thead>
                            <tbody id="resultBody"></tbody>
                        </table>
                    </div>
                </section>
            </section>

            <aside class="details-pane">
                <div class="details-pane-header">
                    <p class="eyebrow">Details</p>
                    <h2>Report Summary</h2>
                </div>
                <section class="summary-grid" id="summaryGrid"></section>
                <section class="selection-panel">
                    <p class="details-section-label">Selection</p>
                    <div id="selectionDetails" class="selection-details"></div>
                </section>
            </aside>
        </div>
    </div>

    <div id="columnPickerMenu" class="column-picker-menu" hidden>
        <p class="column-picker-title">Visible columns</p>
        <div id="columnOptions" class="column-options"></div>
    </div>

    <script id="smartlsReport" type="application/json">/*SMARTLS_JSON*/</script>
    <script>/*SMARTLS_JS*/</script>
</body>
</html>
